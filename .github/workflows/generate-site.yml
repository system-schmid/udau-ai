name: Generate Site

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "conversations/**"
      - "proposals/**"
      - "scripts/generate-site.py"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install markdown

      - name: Generate site
        run: python3 scripts/generate-site.py

      - name: Commit generated files
        run: |
          git config user.name "UDAU Site Generator"
          git config user.email "udau-bot@noreply.github.com"
          git add site/
          if git diff --cached --quiet; then
            echo "No site changes — nothing to commit."
          else
            git commit -m "chore: regenerate site [skip ci]"
            git push
          fi
